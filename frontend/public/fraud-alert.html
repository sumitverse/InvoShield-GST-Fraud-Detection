          <path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input id="fa-search" type="text" placeholder="Search GSTIN, Entity, ID..."
          style="background:transparent; border:none; color:#fff; outline:none; margin-left:8px; width:100%; font-size:0.85rem; font-family:inherit;" />
      </div>
      <button class="tbtn ghost">

          <circle cx="12" cy="12" r="3" />
          <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14" />

      <button class="logout-btn" onclick="logout()"

          <line x1="21" y1="12" x2="9" y2="12" />

  <script src="/js/fraud-alerts.js"></script>
  <script>
    function logout() {
      localStorage.removeItem('token');
      window.location.href = '/public/login.html';
    }
